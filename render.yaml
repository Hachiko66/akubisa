services:
  - type: web
    name: akubisa
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: akubisa-db
    databaseName: akubisa_db
    user: akubisa_user
